name: Deploy CuraSense to Azure Container Apps

on:
  push:
    branches: [stable-v2]
  workflow_dispatch:

env:
  RESOURCE_GROUP: curasense-rg
  ACR_NAME: curasenseacr
  ENVIRONMENT_NAME: curasense-env
  LOCATION: centralindia

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      # ── Checkout ──
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Azure Login ──
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ── ACR Login ──
      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      # ── Build & Push Images ──
      - name: Build & push frontend image
        run: |
          az acr build \
            --registry ${{ env.ACR_NAME }} \
            --image curasense-frontend:${{ github.sha }} \
            --image curasense-frontend:latest \
            --file curasense-frontend/Dockerfile \
            curasense-frontend/

      - name: Build & push backend-ml image
        run: |
          az acr build \
            --registry ${{ env.ACR_NAME }} \
            --image curasense-ml:${{ github.sha }} \
            --image curasense-ml:latest \
            --file curasense-ml/Dockerfile \
            curasense-ml/

      - name: Build & push backend-vision image
        run: |
          az acr build \
            --registry ${{ env.ACR_NAME }} \
            --image curasense-vision:${{ github.sha }} \
            --image curasense-vision:latest \
            --file ml-fastapi/Dockerfile \
            ml-fastapi/

      # ── Deploy Backend ML ──
      - name: Deploy backend-ml
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppName: curasense-ml
          containerAppEnvironment: ${{ env.ENVIRONMENT_NAME }}
          imageToDeploy: ${{ env.ACR_NAME }}.azurecr.io/curasense-ml:${{ github.sha }}
          targetPort: 8000
          ingress: external
          environmentVariables: >-
            GOOGLE_API_KEY=secretref:ml-google-api-key
            GROQ_API_KEY=secretref:ml-groq-api-key
            TAVILY_API_KEY=secretref:ml-tavily-api-key
            HOST=0.0.0.0
            PORT=8000
            LOG_LEVEL=INFO
            ALLOWED_ORIGINS=${{ secrets.FRONTEND_URL }},http://localhost:3000

      # ── Deploy Backend Vision ──
      - name: Deploy backend-vision
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppName: curasense-vision
          containerAppEnvironment: ${{ env.ENVIRONMENT_NAME }}
          imageToDeploy: ${{ env.ACR_NAME }}.azurecr.io/curasense-vision:${{ github.sha }}
          targetPort: 8001
          ingress: external
          environmentVariables: >-
            GOOGLE_API_KEY=secretref:vision-google-api-key
            GROQ_API_KEY=secretref:vision-groq-api-key
            TAVILY_API_KEY=secretref:vision-tavily-api-key
            GOOGLE_CREDENTIALS_BASE64=secretref:vision-google-creds
            HF_TOKEN=secretref:vision-hf-token
            HOST=0.0.0.0
            PORT=8001
            LOG_LEVEL=INFO
            ALLOWED_ORIGINS=${{ secrets.FRONTEND_URL }},http://localhost:3000

      # ── Deploy Frontend ──
      - name: Deploy frontend
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppName: curasense-frontend
          containerAppEnvironment: ${{ env.ENVIRONMENT_NAME }}
          imageToDeploy: ${{ env.ACR_NAME }}.azurecr.io/curasense-frontend:${{ github.sha }}
          targetPort: 3000
          ingress: external
          environmentVariables: >-
            DATABASE_URL=secretref:database-url
            JWT_SECRET=secretref:jwt-secret
            JWT_REFRESH_SECRET=secretref:jwt-refresh-secret
            ACCESS_TOKEN_EXPIRES_IN=15m
            REFRESH_TOKEN_EXPIRES_IN=7d
            BACKEND_API_URL=${{ secrets.ML_API_URL }}
            NEXT_PUBLIC_ML_API_URL=${{ secrets.ML_API_URL }}
            NEXT_PUBLIC_VISION_API_URL=${{ secrets.VISION_API_URL }}
            NODE_ENV=production
            NEXT_TELEMETRY_DISABLED=1

      # ── Print URLs ──
      - name: Get deployment URLs
        run: |
          echo "🎉 Deployment Complete!"
          echo "Frontend:       $(az containerapp show -n curasense-frontend -g ${{ env.RESOURCE_GROUP }} --query 'properties.configuration.ingress.fqdn' -o tsv)"
          echo "Backend ML:     $(az containerapp show -n curasense-ml -g ${{ env.RESOURCE_GROUP }} --query 'properties.configuration.ingress.fqdn' -o tsv)"
          echo "Backend Vision: $(az containerapp show -n curasense-vision -g ${{ env.RESOURCE_GROUP }} --query 'properties.configuration.ingress.fqdn' -o tsv)"
